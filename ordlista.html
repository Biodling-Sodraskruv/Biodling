      line-height: 1.6;
      min-height: 100vh;

      font-size: 0.84rem;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surf);

      border-bottom: 1px solid var(--border);
    }
    header h1 {
      font-size: 1.55rem;
      font-weight: 600;
      color: var(--honey);
      letter-spacing: 0.01em;
    }
    header p {
      color: var(--muted);
      font-size: 0.85rem;
      margin-top: 3px;
    }

    .wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    .controls {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .search-box {
      position: relative;
      flex: 1;
      min-width: 180px;
    }
    .search-box svg {
      position: absolute;
      left: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      width: 15px; height: 15px;
      pointer-events: none;
    }
    .search-box input {
      width: 100%;
      padding: 9px 12px 9px 33px;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.92rem;
      outline: none;
    }
    .search-box input:focus { border-color: var(--amber); }
    .search-box input::placeholder { color: var(--muted); }
    select {
      padding: 9px 12px;
      background: var(--surf);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.88rem;
      outline: none;
      cursor: pointer;
    }
    select:focus { border-color: var(--amber); }

    .stats {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 18px;
    }

    .cat-heading {
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--amber);
      margin: 28px 0 8px;
      padding-bottom: 5px;
      border-bottom: 1px solid var(--border);
    }

    .term {
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 0 16px;
      padding: 8px 10px;
      border-radius: 4px;
      margin: 0 -10px;
    }
    .term:nth-child(even) { background: var(--surf2); }
    .term-name {
      font-weight: 600;
      color: var(--text);
      font-size: 0.92rem;
    }
    .term-name mark {
      background: #c8871a55;
      color: var(--honey);
      border-radius: 2px;
      padding: 0 1px;
    }
    .term-def {
      color: #bdb8a5;
      font-size: 0.88rem;
    }
    .term-def mark {
      background: #c8871a55;
      color: var(--honey);
      border-radius: 2px;
      padding: 0 1px;
    }

    .empty {
      text-align: center;
      color: var(--muted);
      padding: 48px 0;
      font-size: 0.9rem;
    }

    footer {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      padding: 20px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 520px) {
      .term { grid-template-columns: 1fr; gap: 1px; }
      .term-def { color: var(--muted); }
    }
  </style>
</head>

// Populate category dropdown
const cats = [...new Set(DATA.map(d => d.cat))];
const sel = document.getElementById('cat');
cats.forEach(c => {
  const o = document.createElement('option');
  o.value = c; o.textContent = c;
  sel.appendChild(o);
});

function esc(str) {
  return str.replace(/[&<>"']/g, c =>
    ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function highlight(str, q) {
  if (!q) return esc(str);
  const re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
  return esc(str).replace(re, '<mark>$1</mark>');
}

function render() {
  const q = document.getElementById('q').value.trim().toLowerCase();
  const catFilter = sel.value;

  let filtered = DATA.filter(d => {
    const matchCat = !catFilter || d.cat === catFilter;
    const matchQ   = !q || d.term.toLowerCase().includes(q) || d.def.toLowerCase().includes(q);
    return matchCat && matchQ;
  });

  document.getElementById('stats').textContent = filtered.length === DATA.length
    ? `${DATA.length} termer · ${cats.length} kategorier`
    : `${filtered.length} av ${DATA.length} termer`;

  if (!filtered.length) {
    document.getElementById('list').innerHTML =
      '<div class="empty">Inga termer matchar sökningen.</div>';
    return;
  }

  // Group by category
  const groups = {};
  filtered.forEach(d => {
    if (!groups[d.cat]) groups[d.cat] = [];
    groups[d.cat].push(d);
  });

  let html = '';
  for (const [cat, terms] of Object.entries(groups)) {
    if (!catFilter) html += `<div class="cat-heading">${esc(cat)}</div>`;
    terms.forEach((d, i) => {
      html += `<div class="term" style="${i%2===1?'background:var(--surf2)':''}">
        <div class="term-name">${highlight(d.term, q)}</div>
        <div class="term-def">${highlight(d.def, q)}</div>
      </div>`;
    });
  }
  document.getElementById('list').innerHTML = html;
}

document.getElementById('q').addEventListener('input', render);
sel.addEventListener('change', render);
render();
</script>
